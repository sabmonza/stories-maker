<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SABAOTH Stories Maker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --brand: #09af00;
            --brand-dark: #078a00;
            --brand-soft: rgba(9, 175, 0, 0.10);
            --brand-ring: rgba(9, 175, 0, 0.28);

            --bg-grad-1: #f3f6f2;
            --bg-grad-2: #e7ece7;
            --surface: #ffffff;
            --surface-2: #f6f8f6;
            --text: #16201a;
            --text-soft: #5d6b62;
            --muted: #9aa69e;
            --border: #e4eae5;
            --border-strong: #d3ddd6;

            --rec: #e23b48;
            --rec-dark: #c42b38;

            --error-bg: #fdecee;
            --error-text: #b3261e;
            --ok-bg: #e3f6e1;
            --ok-text: #1c7a16;

            --shadow-sm: 0 1px 2px rgba(20,40,28,.06), 0 1px 3px rgba(20,40,28,.05);
            --shadow-md: 0 4px 14px rgba(20,40,28,.08), 0 2px 6px rgba(20,40,28,.05);
            --shadow-lg: 0 18px 50px rgba(20,40,28,.14);
            --radius: 18px;
            --radius-sm: 12px;
        }

        [data-theme="dark"] {
            --bg-grad-1: #10160f;
            --bg-grad-2: #0a0e0c;
            --surface: #161d18;
            --surface-2: #1d2620;
            --text: #e9efe9;
            --text-soft: #a4b1a8;
            --muted: #6f7c73;
            --border: #232e26;
            --border-strong: #2d3a30;
            --brand-soft: rgba(9, 175, 0, 0.16);
            --error-bg: #2a1416;
            --error-text: #ff8a82;
            --ok-bg: #11291a;
            --ok-text: #5fd16a;
            --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
            --shadow-md: 0 6px 20px rgba(0,0,0,.45);
            --shadow-lg: 0 22px 60px rgba(0,0,0,.6);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background:
                radial-gradient(1200px 600px at 80% -10%, var(--brand-soft), transparent 60%),
                linear-gradient(160deg, var(--bg-grad-1), var(--bg-grad-2));
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            transition: background-color .35s, color .35s;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            position: sticky; top: 0; z-index: 50;
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 28px;
            background: color-mix(in srgb, var(--surface) 78%, transparent);
            backdrop-filter: saturate(140%) blur(14px);
            -webkit-backdrop-filter: saturate(140%) blur(14px);
            border-bottom: 1px solid var(--border);
        }
        .logo { height: 38px; width: auto; display: block; }
        .header-spacer { width: 120px; }
        .header-actions { display: flex; align-items: center; gap: 10px; width: 120px; justify-content: flex-end; }

        .theme-toggle {
            display: inline-flex; align-items: center; gap: 7px;
            background: var(--surface-2); color: var(--text-soft);
            border: 1px solid var(--border);
            padding: 9px 14px; border-radius: 999px; cursor: pointer;
            font-family: inherit; font-weight: 600; font-size: 12.5px;
            transition: transform .15s, background .2s, color .2s, border-color .2s;
        }
        .theme-toggle:hover { transform: translateY(-1px); border-color: var(--border-strong); color: var(--text); }
        .theme-toggle svg { width: 16px; height: 16px; }

        .wrap { max-width: 1320px; margin: 0 auto; padding: 26px 24px 60px; }

        .settings {
            display: flex; flex-wrap: wrap; align-items: center; gap: 14px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px 18px;
            box-shadow: var(--shadow-sm); margin-bottom: 22px;
        }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); }
        .input-wrap { position: relative; display: flex; align-items: center; }
        .input {
            font-family: inherit; font-size: 14px; padding: 11px 14px;
            border: 1.5px solid var(--border-strong); border-radius: var(--radius-sm);
            background: var(--surface-2); color: var(--text);
            transition: border-color .2s, box-shadow .2s; outline: none;
        }
        .input:focus { border-color: var(--brand); box-shadow: 0 0 0 4px var(--brand-ring); }
        #apiKey { width: 280px; padding-right: 42px; }
        .eye { position: absolute; right: 8px; background: none; border: none; cursor: pointer; color: var(--muted); padding: 6px; display: flex; border-radius: 8px; }
        .eye:hover { color: var(--text); }
        select.input { cursor: pointer; min-width: 200px; }

        .pill-btn {
            font-family: inherit; font-weight: 700; font-size: 13.5px;
            padding: 11px 18px; border: none; border-radius: var(--radius-sm);
            background: var(--brand); color: #fff; cursor: pointer; box-shadow: var(--shadow-sm);
            transition: transform .15s, box-shadow .2s, background .2s;
        }
        .pill-btn:hover { background: var(--brand-dark); transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .pill-btn:active { transform: translateY(0); }

        .status { display: inline-flex; align-items: center; gap: 7px; padding: 7px 13px; border-radius: 999px; font-size: 12.5px; font-weight: 700; align-self: flex-end; }
        .status .dot { width: 8px; height: 8px; border-radius: 50%; }
        .status.connected { background: var(--ok-bg); color: var(--ok-text); }
        .status.connected .dot { background: var(--ok-text); }
        .status.disconnected { background: var(--error-bg); color: var(--error-text); }
        .status.disconnected .dot { background: var(--error-text); }

        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
        .panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow-md);
            display: flex; flex-direction: column;
            opacity: 0; transform: translateY(12px);
            animation: rise .5s cubic-bezier(.2,.7,.3,1) forwards;
        }
        .panel:nth-child(2) { animation-delay: .08s; }
        @keyframes rise { to { opacity: 1; transform: none; } }

        .panel-head { display: flex; align-items: center; gap: 11px; margin-bottom: 18px; }
        .panel-head .icon { width: 38px; height: 38px; border-radius: 11px; display: grid; place-items: center; background: var(--brand-soft); color: var(--brand); }
        .panel-head .icon svg { width: 21px; height: 21px; }
        .panel-head h2 { font-size: 18px; font-weight: 800; letter-spacing: -.01em; }
        .panel-head .sub { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 1px; }

        .controls { display: flex; gap: 9px; margin-bottom: 16px; flex-wrap: wrap; }
        .btn {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 10px 16px; border: none; border-radius: var(--radius-sm);
            cursor: pointer; font-size: 13.5px; font-weight: 700; font-family: inherit;
            transition: transform .15s, box-shadow .2s, background .2s, opacity .2s;
        }
        .btn svg { width: 16px; height: 16px; }
        .btn:hover { transform: translateY(-1px); }
        .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
        .btn-rec { background: var(--rec); color: #fff; box-shadow: var(--shadow-sm); }
        .btn-rec:hover { background: var(--rec-dark); }
        .btn-rec.recording { background: var(--rec); animation: recpulse 1.8s infinite; }
        @keyframes recpulse {
            0%   { box-shadow: 0 0 0 0 rgba(226,59,72,.5); }
            70%  { box-shadow: 0 0 0 12px rgba(226,59,72,0); }
            100% { box-shadow: 0 0 0 0 rgba(226,59,72,0); }
        }
        .btn-ghost { background: var(--surface-2); color: var(--text-soft); border: 1px solid var(--border-strong); }
        .btn-ghost:hover { color: var(--text); border-color: var(--brand); }
        .btn-brand { background: var(--brand); color: #fff; box-shadow: var(--shadow-sm); }
        .btn-brand:hover { background: var(--brand-dark); }

        .rec-bar {
            display: none; align-items: center; gap: 14px;
            background: var(--surface-2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 16px;
        }
        .rec-bar.active { display: flex; }
        .rec-time { font-variant-numeric: tabular-nums; font-weight: 800; font-size: 16px; color: var(--text); }
        .rec-led { width: 10px; height: 10px; border-radius: 50%; background: var(--rec); animation: blink 1.2s infinite; }
        @keyframes blink { 50% { opacity: .25; } }
        .meter { flex: 1; display: flex; align-items: center; gap: 3px; height: 26px; }
        .meter .bar { flex: 1; height: 20%; background: var(--brand); border-radius: 3px; opacity: .35; transition: height .1s, opacity .1s; }

        .scroll {
            background: var(--surface-2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 16px;
            flex: 1; min-height: 420px; max-height: 56vh; overflow-y: auto;
        }
        .scroll::-webkit-scrollbar { width: 9px; }
        .scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; }
        .scroll::-webkit-scrollbar-track { background: transparent; }

        .placeholder { color: var(--muted); text-align: center; padding: 60px 20px; font-weight: 500; }
        .placeholder svg { width: 38px; height: 38px; opacity: .4; margin-bottom: 12px; }

        .t-item {
            margin-bottom: 10px; padding: 12px 14px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; line-height: 1.6; font-size: 14px;
            animation: rise .35s ease forwards;
        }
        .t-item .stamp {
            display: inline-block; color: var(--brand); font-weight: 800; font-size: 11.5px;
            font-variant-numeric: tabular-nums; margin-right: 9px;
            background: var(--brand-soft); padding: 2px 8px; border-radius: 7px;
        }

        .loading { display: flex; align-items: center; gap: 9px; justify-content: center; color: var(--brand); padding: 12px; font-size: 13.5px; font-weight: 600; }
        .spinner { width: 16px; height: 16px; border: 2.5px solid var(--brand-soft); border-top-color: var(--brand); border-radius: 50%; animation: spin .7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .inline-error {
            background: var(--error-bg); color: var(--error-text);
            padding: 11px 14px; border-radius: 12px; margin: 8px 0; font-size: 13px;
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
        }
        .inline-error button { background: var(--error-text); color: #fff; border: none; border-radius: 8px; padding: 6px 12px; font-family: inherit; font-weight: 700; font-size: 12px; cursor: pointer; white-space: nowrap; }

        .chat-scroll { display: flex; flex-direction: column; gap: 14px; }
        .msg { display: flex; gap: 10px; max-width: 92%; animation: rise .3s ease forwards; }
        .msg .avatar { flex-shrink: 0; width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center; }
        .msg .avatar svg { width: 18px; height: 18px; }
        .msg .bubble { padding: 11px 14px; border-radius: 14px; font-size: 14px; line-height: 1.62; }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg.user .avatar { background: var(--brand); color: #fff; }
        .msg.user .bubble { background: var(--brand); color: #fff; border-bottom-right-radius: 5px; }
        .msg.assistant .avatar { background: var(--text); color: var(--surface); }
        [data-theme="dark"] .msg.assistant .avatar { background: var(--surface-2); color: var(--text); border: 1px solid var(--border-strong); }
        .msg.assistant .bubble { background: var(--surface-2); border: 1px solid var(--border); border-bottom-left-radius: 5px; position: relative; }
        .bubble p { margin: 0 0 8px; } .bubble p:last-child { margin-bottom: 0; }
        .bubble h3 { font-size: 14px; font-weight: 800; margin: 10px 0 5px; } .bubble h3:first-child { margin-top: 0; }
        .bubble ul, .bubble ol { margin: 6px 0 8px; padding-left: 20px; } .bubble li { margin-bottom: 4px; }
        .bubble code { background: var(--brand-soft); color: var(--brand); padding: 1px 6px; border-radius: 6px; font-size: 12.5px; }
        .bubble strong { font-weight: 800; }
        .copy-btn { position: absolute; top: 7px; right: 7px; opacity: 0; transition: opacity .2s; background: var(--surface); border: 1px solid var(--border-strong); border-radius: 8px; padding: 5px; cursor: pointer; color: var(--text-soft); display: flex; }
        .msg.assistant .bubble:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { color: var(--brand); }
        .copy-btn svg { width: 14px; height: 14px; }

        .typing { display: flex; gap: 4px; padding: 4px 2px; }
        .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
        .typing span:nth-child(2) { animation-delay: .15s; } .typing span:nth-child(3) { animation-delay: .3s; }
        @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: .4; } 30% { transform: translateY(-5px); opacity: 1; } }

        .chat-input-row { display: flex; gap: 10px; margin-top: 14px; align-items: flex-end; }
        .chat-input-row textarea {
            flex: 1; padding: 12px 14px; border: 1.5px solid var(--border-strong);
            border-radius: var(--radius-sm); resize: none; font-family: inherit; font-size: 14px;
            background: var(--surface-2); color: var(--text); line-height: 1.5;
            max-height: 160px; outline: none; transition: border-color .2s, box-shadow .2s;
        }
        .chat-input-row textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 4px var(--brand-ring); }
        .send-btn { width: 46px; height: 46px; border-radius: 13px; border: none; background: var(--brand); color: #fff; cursor: pointer; display: grid; place-items: center; flex-shrink: 0; transition: background .2s, transform .15s; }
        .send-btn:hover { background: var(--brand-dark); transform: translateY(-1px); }
        .send-btn svg { width: 19px; height: 19px; }
        .chat-tools { display: flex; gap: 9px; flex-wrap: wrap; margin-top: 11px; }

        #toasts { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .toast {
            display: flex; align-items: center; gap: 10px;
            background: var(--text); color: var(--surface);
            padding: 12px 18px; border-radius: 12px; font-size: 13.5px; font-weight: 600;
            box-shadow: var(--shadow-lg); animation: toastIn .3s ease, toastOut .3s ease 3.2s forwards; max-width: 90vw;
        }
        .toast.ok { background: var(--brand); color: #fff; }
        .toast.err { background: var(--rec); color: #fff; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(14px); } }
        @keyframes toastOut { to { opacity: 0; transform: translateY(14px); } }

        @media (max-width: 880px) {
            .container { grid-template-columns: 1fr; }
            .wrap { padding: 18px 14px 50px; }
            #apiKey { width: 100%; }
            .field, .input-wrap { width: 100%; }
            .header { padding: 14px 16px; }
            .logo { height: 32px; }
            .header-spacer, .header-actions { width: auto; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-spacer"></div>
        <img src="logo-black.png" alt="SABAOTH Stories Maker" class="logo" id="logo"
             onerror="this.onerror=null;this.src='https://i.ibb.co/pr9W4HTq/logo-black.png'">
        <div class="header-actions">
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
                <span id="themeIcon"></span><span id="themeLabel">Tema</span>
            </button>
        </div>
    </header>

    <div class="wrap">
        <div class="settings">
            <div class="field">
                <label for="apiKey">OpenAI API Key</label>
                <div class="input-wrap">
                    <input type="password" id="apiKey" class="input" placeholder="sk-...">
                    <button class="eye" onclick="toggleKey()" id="eyeBtn" title="Mostra/Nascondi"></button>
                </div>
            </div>
            <div class="field" style="justify-content:flex-end;">
                <label>&nbsp;</label>
                <button class="pill-btn" onclick="saveApiKey()">Salva chiave</button>
            </div>
            <div class="field">
                <label for="transcribeModel">Modello trascrizione</label>
                <select id="transcribeModel" class="input">
                    <option value="gpt-4o-mini-transcribe">GPT-4o mini Transcribe · consigliato</option>
                    <option value="gpt-4o-transcribe">GPT-4o Transcribe · max qualità</option>
                    <option value="whisper-1">Whisper-1 · classico</option>
                </select>
            </div>
            <div class="field">
                <label for="audioSource">Microfono</label>
                <select id="audioSource" class="input"><option>Caricamento...</option></select>
            </div>
            <div class="status disconnected" id="apiStatus" style="align-self:flex-end;">
                <span class="dot"></span><span id="apiStatusText">Non configurato</span>
            </div>
        </div>

        <div class="container">
            <section class="panel">
                <div class="panel-head">
                    <div class="icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
                    </div>
                    <div>
                        <h2>Trascrizione</h2>
                        <div class="sub">Voce in testo in tempo reale</div>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn btn-rec" id="recBtn" onclick="toggleRecording()">
                        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="7"/></svg>
                        <span id="recLabel">Registra</span>
                    </button>
                    <button class="btn btn-ghost" id="stopBtn" onclick="stopRecording()" disabled>
                        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg> Stop
                    </button>
                    <button class="btn btn-brand" onclick="saveTranscript()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Salva
                    </button>
                    <button class="btn btn-ghost" onclick="clearTranscript()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Pulisci
                    </button>
                </div>

                <div class="rec-bar" id="recBar">
                    <span class="rec-led"></span>
                    <span class="rec-time" id="recTime">00:00</span>
                    <div class="meter" id="meter"></div>
                </div>

                <div id="transcriptArea" class="scroll">
                    <div class="placeholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/></svg>
                        <div>Premi <strong>Registra</strong> per iniziare</div>
                    </div>
                </div>
            </section>

            <section class="panel">
                <div class="panel-head">
                    <div class="icon" id="openaiIcon">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.28 9.82a5.98 5.98 0 0 0-.52-4.91 6.05 6.05 0 0 0-6.51-2.9A6 6 0 0 0 4.98 4.18a5.98 5.98 0 0 0-3.99 2.9 6.05 6.05 0 0 0 .74 7.1 5.98 5.98 0 0 0 .51 4.91 6.05 6.05 0 0 0 6.52 2.9A5.98 5.98 0 0 0 13.26 22a6.05 6.05 0 0 0 5.77-4.2 5.98 5.98 0 0 0 3.99-2.9 6.05 6.05 0 0 0-.74-7.08zM13.26 20.6a4.48 4.48 0 0 1-2.88-1.04l.14-.08 4.78-2.76a.78.78 0 0 0 .39-.68v-6.74l2.02 1.17a.07.07 0 0 1 .04.05v5.58a4.5 4.5 0 0 1-4.49 4.5zM3.6 16.47a4.47 4.47 0 0 1-.54-3.02l.14.09 4.78 2.76a.78.78 0 0 0 .78 0l5.84-3.37v2.33a.08.08 0 0 1-.03.06l-4.83 2.79a4.5 4.5 0 0 1-6.14-1.64zM2.34 6.92a4.48 4.48 0 0 1 2.34-1.97V10.6a.77.77 0 0 0 .39.68l5.81 3.35-2.02 1.17a.07.07 0 0 1-.07 0l-4.83-2.79a4.5 4.5 0 0 1-1.63-6.09zm16.6 3.86-5.84-3.39 2.02-1.16a.07.07 0 0 1 .07 0l4.83 2.78a4.5 4.5 0 0 1-.68 8.12v-5.66a.78.78 0 0 0-.4-.69zm2.01-3.02-.14-.09-4.77-2.78a.78.78 0 0 0-.79 0L9.42 8.27V5.94a.07.07 0 0 1 .03-.06l4.83-2.79a4.5 4.5 0 0 1 6.68 4.66zM8.32 11.9 6.3 10.74a.08.08 0 0 1-.04-.06V5.11a4.5 4.5 0 0 1 7.38-3.45l-.14.08L8.7 4.5a.78.78 0 0 0-.39.68zm1.1-2.37 2.6-1.5 2.6 1.5v3l-2.6 1.5-2.6-1.5z"/></svg>
                    </div>
                    <div>
                        <h2>Assistente ChatGPT</h2>
                        <div class="sub" id="chatModelSub">gpt-5.4-mini</div>
                    </div>
                    <select id="chatModel" class="input" style="margin-left:auto;min-width:auto;padding:7px 10px;font-size:12.5px;" onchange="document.getElementById('chatModelSub').textContent=this.value">
                        <option value="gpt-5.4-mini">GPT-5.4 mini · veloce</option>
                        <option value="gpt-5.2-chat-latest">GPT-5.2 · instant</option>

                <div id="chatArea" class="scroll chat-scroll">
                    <div class="placeholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <div>Inserisci la trascrizione e genera le tue Stories</div>

                <div class="chat-input-row">
                    <textarea id="chatInput" placeholder="Scrivi un messaggio o incolla la trascrizione..." rows="1"></textarea>
                    <button class="send-btn" onclick="sendMessage()" title="Invia">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
                <div class="chat-tools">
                    <button class="btn btn-ghost" onclick="insertTranscript()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg> Inserisci trascrizione
                    </button>
                    <button class="btn btn-ghost" onclick="insertPrompt()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Inserisci prompt
                    </button>
                    <button class="btn btn-ghost" onclick="clearChat()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg> Pulisci chat
                    </button>
                </div>
            </section>
        </div>
    </div>

    <div id="toasts"></div>

    <script>
    const SEGMENT_MS = 8000; // segmenti brevi: il testo compare ogni ~8s, sembra quasi live
    const MIN_SEGMENT_MS = 700;
    const PROMPT_TAIL_CHARS = 220;

    let apiKey = localStorage.getItem('openai_api_key') || '';
    let transcriptData = [];
    let chatHistory = [];

    let isRecording = false;
    let persistentStream = null;
    let mediaRecorder = null;
    let segChunks = [];
    let segMimeType = '';
    let segTimer = null;
    let segStartedAt = 0;
    let segStartElapsedMs = 0;
    let recordingStartTime = null;

    let queue = [];
    let processing = false;
    let promptTail = '';

    let audioCtx = null, analyser = null, meterRAF = null, meterBars = [];

    const defaultPrompt = `PROMPT PER ESTRAZIONE CONTENUTI DA PREDICAZIONI

CONTESTO
Sei un esperto di content creation per social media religiosi. Il tuo compito è analizzare trascrizioni di predicazioni/sermoni e estrarre contenuti ottimizzati per Instagram Stories.

OBIETTIVO
Partendo dalla trascrizione di una predicazione, devi creare contenuti per Instagram Stories.

FRASI PER INSTAGRAM STORIES
* **Lunghezza**: Frasi brevi e d'impatto (massimo 1-2 righe)
* **Tipologia**: Frasi motivazionali, di sfida, bibliche/spirituali
* **Correzioni**: Correggi eventuali errori grammaticali mantenendo il tono originale
* **Numero**: 15-20 frasi per trascrizione
* **Organizzazione**: Raggruppa per categorie tematiche

CRITERI DI SELEZIONE
* Frasi che generano riflessione
* Messaggi universali applicabili a tutti
* Citazioni bibliche parafrasate
* Chiamate all'azione spirituali
* Affermazioni motivazionali potenti

TONO E STILE
* Mantieni ESATTAMENTE lo stesso tono del predicatore
* Conserva le espressioni caratteristiche
* Non modificare il messaggio teologico
* Rispetta il linguaggio colloquiale se presente
* Preserva l'autenticità emotiva

FORMATO OUTPUT
Presenta i risultati in una sezione unica:
1. **Sezione A**: Lista delle frasi per Stories organizzate per categoria

ESEMPIO DI RICHIESTA
"Analizza questa trascrizione di predicazione ed estrai frasi per Stories seguendo i criteri sopra indicati."`;

    const ICON_MOON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    const ICON_SUN  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';

    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('logo').src = theme === 'dark' ? 'logo-white.png' : 'logo-black.png';
        document.getElementById('themeIcon').innerHTML = theme === 'dark' ? ICON_SUN : ICON_MOON;
        document.getElementById('themeLabel').textContent = theme === 'dark' ? 'Chiaro' : 'Scuro';
    }
    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        localStorage.setItem('theme', next);
        applyTheme(next);
    }
    applyTheme(localStorage.getItem('theme') || 'light');

    function toast(msg, type) {
        const el = document.createElement('div');
        el.className = 'toast' + (type ? ' ' + type : '');
        el.textContent = msg;
        document.getElementById('toasts').appendChild(el);
        setTimeout(() => el.remove(), 3600);
    }

    function setApiStatus(connected) {
        const s = document.getElementById('apiStatus');
        s.className = 'status ' + (connected ? 'connected' : 'disconnected');
        document.getElementById('apiStatusText').textContent = connected ? 'Connesso' : 'Non configurato';
    }
    if (apiKey) { document.getElementById('apiKey').value = apiKey; setApiStatus(true); }

    function saveApiKey() {
        apiKey = document.getElementById('apiKey').value.trim();
        if (apiKey) { localStorage.setItem('openai_api_key', apiKey); setApiStatus(true); toast('API Key salvata', 'ok'); }
        else { setApiStatus(false); toast('Inserisci una API Key valida', 'err'); }
    }
    function toggleKey() {
        const inp = document.getElementById('apiKey');
        inp.type = inp.type === 'password' ? 'text' : 'password';
        document.getElementById('eyeBtn').innerHTML = inp.type === 'password'
            ? '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>'
            : '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    }
    toggleKey(); toggleKey();

    async function loadAudioDevices() {
        try {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            const inputs = devices.filter(d => d.kind === 'audioinput');
            const sel = document.getElementById('audioSource');
            sel.innerHTML = '';
            inputs.forEach((d, i) => {
                const o = document.createElement('option');
                o.value = d.deviceId;
                o.text = d.label || ('Microfono ' + (i + 1));
                sel.appendChild(o);
            });
            sel.onchange = () => localStorage.setItem('selected_audio_device', sel.value);
            const saved = localStorage.getItem('selected_audio_device');
            if (saved) sel.value = saved;
        } catch (e) {
            document.getElementById('audioSource').innerHTML = "<option>Permetti l'accesso al microfono</option>";
        }
    }
    window.addEventListener('load', loadAudioDevices);

    function pickMimeType() {
        const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'];
        for (const t of types) if (window.MediaRecorder && MediaRecorder.isTypeSupported(t)) return t;
        return '';
    }
    function fmtTime(ms) {
        const s = Math.floor(ms / 1000), m = Math.floor(s / 60);
        return String(m).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
    }

    async function toggleRecording() {
        if (!apiKey) { toast('Configura prima la tua API Key', 'err'); return; }
        if (isRecording) { stopRecording(); return; }
        try {
            const deviceId = document.getElementById('audioSource').value;
            persistentStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    deviceId: deviceId ? { exact: deviceId } : undefined,
                    channelCount: 1,
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true
                }
            });
        } catch (e) {
            toast('Errore accesso microfono: ' + e.message, 'err');
            return;
        }

        segMimeType = pickMimeType();
        isRecording = true;
        recordingStartTime = Date.now();
        promptTail = '';

        document.getElementById('recBtn').classList.add('recording');
        document.getElementById('recLabel').textContent = 'Pausa';
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('recBar').classList.add('active');

        startMeter();
        startSegment();
        tickTimer();
    }

    function startSegment() {
        if (!isRecording || !persistentStream) return;
        try {
            mediaRecorder = segMimeType
                ? new MediaRecorder(persistentStream, { mimeType: segMimeType })
                : new MediaRecorder(persistentStream);
        } catch (e) {
            mediaRecorder = new MediaRecorder(persistentStream);
        }
        segChunks = [];
        segStartedAt = performance.now();
        segStartElapsedMs = Date.now() - recordingStartTime;

        mediaRecorder.ondataavailable = (ev) => { if (ev.data && ev.data.size > 0) segChunks.push(ev.data); };
        mediaRecorder.onstop = () => {
            const dur = performance.now() - segStartedAt;
            if (segChunks.length && dur >= MIN_SEGMENT_MS) {
                const blob = new Blob(segChunks, { type: segMimeType || 'audio/webm' });
                enqueue(blob, segStartElapsedMs);
            }
            segChunks = [];
            if (isRecording) startSegment();
        };

        mediaRecorder.start();
        segTimer = setTimeout(() => {
            if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
        }, SEGMENT_MS);
    }

    function stopRecording() {
        if (!isRecording) return;
        isRecording = false;
        if (segTimer) { clearTimeout(segTimer); segTimer = null; }
        if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        if (persistentStream) { persistentStream.getTracks().forEach(t => t.stop()); persistentStream = null; }
        stopMeter();

        document.getElementById('recBtn').classList.remove('recording');
        document.getElementById('recLabel').textContent = 'Registra';
        document.getElementById('stopBtn').disabled = true;
        document.getElementById('recBar').classList.remove('active');
    }

    function tickTimer() {
        if (!isRecording) return;
        document.getElementById('recTime').textContent = fmtTime(Date.now() - recordingStartTime);
        requestAnimationFrame(tickTimer);
    }

    function startMeter() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const src = audioCtx.createMediaStreamSource(persistentStream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 64;
            src.connect(analyser);
            const meter = document.getElementById('meter');
            meter.innerHTML = '';
            meterBars = [];
            const N = 28;
            for (let i = 0; i < N; i++) { const b = document.createElement('div'); b.className = 'bar'; meter.appendChild(b); meterBars.push(b); }
            const data = new Uint8Array(analyser.frequencyBinCount);
            const loop = () => {
                analyser.getByteFrequencyData(data);
                for (let i = 0; i < meterBars.length; i++) {
                    const v = data[i % data.length] / 255;
                    meterBars[i].style.height = Math.max(20, v * 100) + '%';
                    meterBars[i].style.opacity = (0.35 + v * 0.65).toFixed(2);
                }
                meterRAF = requestAnimationFrame(loop);
            };
            loop();
        } catch (e) {}
    }
    function stopMeter() {
        if (meterRAF) { cancelAnimationFrame(meterRAF); meterRAF = null; }
        if (audioCtx) { audioCtx.close().catch(() => {}); audioCtx = null; }
        analyser = null;
    }

    function enqueue(blob, startElapsedMs) {
        queue.push({ blob, startElapsedMs, retries: 0 });
        processQueue();
    }
    async function processQueue() {
        if (processing) return;
        processing = true;
        while (queue.length) {
            const job = queue[0];
            const ok = await transcribeJob(job);
            if (ok || job.retries >= 2) queue.shift();
            else { job.retries++; await new Promise(r => setTimeout(r, 1200)); }
        }
        processing = false;
    }

    async function transcribeJob(job) {
        const area = document.getElementById('transcriptArea');
        clearPlaceholder(area);
        const loading = document.createElement('div');
        loading.className = 'loading';
        loading.innerHTML = '<span class="spinner"></span> Trascrizione in corso...';
        area.appendChild(loading);
        area.scrollTop = area.scrollHeight;
        try {
            const model = document.getElementById('transcribeModel').value;
            const ext = segMimeType.includes('mp4') ? 'mp4' : (segMimeType.includes('ogg') ? 'ogg' : 'webm');
            const fd = new FormData();
            fd.append('file', job.blob, 'audio.' + ext);
            fd.append('model', model);
            fd.append('language', 'it');
            fd.append('response_format', 'json');
            if (promptTail) fd.append('prompt', promptTail);

            const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + apiKey },
                body: fd
            });
            loading.remove();
            if (!res.ok) {
                let detail = res.statusText;
                try { const j = await res.json(); detail = (j.error && j.error.message) || detail; } catch (e) {}
                throw new Error(detail);
            }
            const data = await res.json();
            const text = (data.text || '').trim();
            if (text) {
                const item = { timestamp: fmtTime(job.startElapsedMs), text };
                transcriptData.push(item);
                renderTranscriptItem(item);
                promptTail = (promptTail + ' ' + text).slice(-PROMPT_TAIL_CHARS);
            }
            return true;
        } catch (err) {
            loading.remove();
            const e = document.createElement('div');
            e.className = 'inline-error';
            const span = document.createElement('span');
            span.textContent = 'Segmento non trascritto: ' + err.message;
            const btn = document.createElement('button');
            btn.textContent = 'Riprova';
            btn.onclick = () => { e.remove(); enqueue(job.blob, job.startElapsedMs); };
            e.appendChild(span); e.appendChild(btn);
            area.appendChild(e);
            area.scrollTop = area.scrollHeight;
            return false;
        }
    }

    function clearPlaceholder(area) {
        const ph = area.querySelector('.placeholder');
        if (ph) area.innerHTML = '';
    }
    function renderTranscriptItem(item) {
        const area = document.getElementById('transcriptArea');
        const div = document.createElement('div');
        div.className = 't-item';
        const stamp = document.createElement('span');
        stamp.className = 'stamp';
        stamp.textContent = item.timestamp;
        div.appendChild(stamp);
        div.appendChild(document.createTextNode(item.text));
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }
    function clearTranscript() {
        if (!transcriptData.length || confirm('Cancellare tutta la trascrizione?')) {
            transcriptData = [];
            document.getElementById('transcriptArea').innerHTML =
                '<div class="placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/></svg><div>Premi <strong>Registra</strong> per iniziare</div></div>';
        }
    }
    function saveTranscript() {
        if (!transcriptData.length) { toast('Nessuna trascrizione da salvare', 'err'); return; }
        const text = transcriptData.map(i => '[' + i.timestamp + '] ' + i.text).join('\n\n');
        const url = URL.createObjectURL(new Blob([text], { type: 'text/plain' }));
        const a = document.createElement('a');
        a.href = url; a.download = 'trascrizione_' + new Date().toISOString().slice(0, 10) + '.txt'; a.click();
        URL.revokeObjectURL(url);
        toast('Trascrizione salvata', 'ok');
    }
    function insertTranscript() {
        if (!transcriptData.length) { toast('Nessuna trascrizione disponibile', 'err'); return; }
        const ta = document.getElementById('chatInput');
        ta.value = transcriptData.map(i => i.text).join(' ');
        autoGrow(ta); ta.focus();
    }
    function insertPrompt() {
        const ta = document.getElementById('chatInput');
        ta.value = defaultPrompt; autoGrow(ta); ta.focus();
    }

    function escapeHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function renderMarkdown(src) {
        let t = escapeHtml(src);
        t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
        t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        t = t.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
        const lines = t.split('\n');
        let html = '', list = null;
        const close = () => { if (list) { html += '</' + list + '>'; list = null; } };
        for (let raw of lines) {
            const line = raw.trim();
            if (/^#{1,6}\s+/.test(line)) { close(); html += '<h3>' + line.replace(/^#{1,6}\s+/, '') + '</h3>'; continue; }
            const ul = line.match(/^[-*]\s+(.*)/);
            const ol = line.match(/^\d+\.\s+(.*)/);
            if (ul) { if (list !== 'ul') { close(); html += '<ul>'; list = 'ul'; } html += '<li>' + ul[1] + '</li>'; continue; }
            if (ol) { if (list !== 'ol') { close(); html += '<ol>'; list = 'ol'; } html += '<li>' + ol[1] + '</li>'; continue; }
            close();
            if (line) html += '<p>' + line + '</p>';
        }
        close();
        return html || '<p></p>';
    }

    const OPENAI_AVATAR = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.28 9.82a5.98 5.98 0 0 0-.52-4.91 6.05 6.05 0 0 0-6.51-2.9A6 6 0 0 0 4.98 4.18a5.98 5.98 0 0 0-3.99 2.9 6.05 6.05 0 0 0 .74 7.1 5.98 5.98 0 0 0 .51 4.91 6.05 6.05 0 0 0 6.52 2.9A5.98 5.98 0 0 0 13.26 22a6.05 6.05 0 0 0 5.77-4.2 5.98 5.98 0 0 0 3.99-2.9 6.05 6.05 0 0 0-.74-7.08zM9.42 9.53l2.6-1.5 2.6 1.5v3l-2.6 1.5-2.6-1.5z"/></svg>';
    const USER_AVATAR = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';

    function addMessage(role, text) {
        const chat = document.getElementById('chatArea');
        clearPlaceholder(chat);
        const msg = document.createElement('div');
        msg.className = 'msg ' + role;
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.innerHTML = role === 'user' ? USER_AVATAR : OPENAI_AVATAR;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        if (role === 'user') {
            bubble.textContent = text;
        } else {
            bubble.innerHTML = renderMarkdown(text);
            const copy = document.createElement('button');
            copy.className = 'copy-btn'; copy.title = 'Copia';
            copy.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
            copy.onclick = () => { navigator.clipboard.writeText(text); toast('Copiato', 'ok'); };
            bubble.appendChild(copy);
        }
        msg.appendChild(avatar); msg.appendChild(bubble);
        chat.appendChild(msg);
        chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message) { toast('Scrivi un messaggio', 'err'); return; }
        if (!apiKey) { toast('Configura prima la tua API Key', 'err'); return; }

        addMessage('user', message);
        input.value = ''; autoGrow(input);
        chatHistory.push({ role: 'user', content: message });

        const chat = document.getElementById('chatArea');
        const typing = document.createElement('div');
        typing.className = 'msg assistant';
        typing.innerHTML = '<div class="avatar">' + OPENAI_AVATAR + '</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
        chat.appendChild(typing);
        chat.scrollTop = chat.scrollHeight;

        try {
            const chatModelName = document.getElementById('chatModel').value;
            // I modelli di ragionamento GPT-5 (es. gpt-5.5, gpt-5.4-mini) usano
            // max_completion_tokens e non accettano una temperature personalizzata.
            // I modelli "instant"/chat-latest si comportano come i vecchi chat model.
            const isInstant = /chat-latest|chat$/.test(chatModelName);
            const reqBody = {
                model: chatModelName,
                messages: [
                    { role: 'system', content: 'Sei un assistente che aiuta a elaborare trascrizioni vocali in italiano. Puoi correggere errori, estrarre punti chiave, riformulare il testo e aiutare a creare contenuti per Instagram Stories.' },
                    ...chatHistory
                ],
                max_completion_tokens: 2000
            };
            if (isInstant) reqBody.temperature = 0.7;
            const res = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                body: JSON.stringify(reqBody)
            });
            typing.remove();
            if (!res.ok) {
                let d = res.statusText; try { const j = await res.json(); d = (j.error && j.error.message) || d; } catch (e) {}
                throw new Error(d);
            }
            const data = await res.json();
            const reply = data.choices[0].message.content;
            addMessage('assistant', reply);
            chatHistory.push({ role: 'assistant', content: reply });
        } catch (err) {
            typing.remove();
            const e = document.createElement('div');
            e.className = 'inline-error';
            e.innerHTML = '<span>Errore: ' + escapeHtml(err.message) + '</span>';
            chat.appendChild(e);
            chat.scrollTop = chat.scrollHeight;
        }
    }

    function clearChat() {
        if (!chatHistory.length || confirm('Cancellare tutta la conversazione?')) {
            chatHistory = [];
            document.getElementById('chatArea').innerHTML =
                '<div class="placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><div>Inserisci la trascrizione e genera le tue Stories</div></div>';
        }
    }

    function autoGrow(ta) { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 160) + 'px'; }
    const chatInput = document.getElementById('chatInput');
    chatInput.addEventListener('input', () => autoGrow(chatInput));
    chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    </script>
</body>
</html>
